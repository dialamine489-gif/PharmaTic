<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PharmaTic - Keur Massar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CONFIGURATION MOBILE & DESKTOP --- */
        @media (min-width: 768px) {
            body { max-width: 450px; margin: 0 auto; border-left: 1px solid rgba(0,0,0,0.1); border-right: 1px solid rgba(0,0,0,0.1); position: relative; }
            .bottom-nav { width: 450px; left: 50% !important; transform: translateX(-50%); }
        }

        :root {
            --primary: #00f2fe; --accent: #10b981;
            --rouge-dimanche: #ff4d4d; --violet-nuit: #a855f7;
            --whatsapp: #25D366; --radius-lg: 24px;
            --radius-md: 16px; --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body.dark-theme { --bg: #0f172a; --text: #f8fafc; --card: rgba(255, 255, 255, 0.08); --nav: #0f172a; --input-bg: rgba(255,255,255,0.05); --card-border: rgba(255,255,255,0.1); }
        body.light-theme { --bg: #f1f5f9; --text: #1e293b; --card: #ffffff; --nav: #ffffff; --input-bg: #e2e8f0; --card-border: rgba(0,0,0,0.05); }
        body.rose-theme { --bg: #fff1f2; --text: #881337; --card: #ffffff; --nav: #fff1f2; --input-bg: #ffe4e6; --card-border: #fecdd3; --accent: #fb7185; }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }

        header { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 15px 10px 5px; }
        .logo-img { width: 55px; height: 55px; border-radius: 15px; border: 2px solid var(--accent); }
        .theme-switcher { display: flex; justify-content: center; gap: 12px; width: 100%; margin-top: 15px; }
        .theme-circle { width: 30px; height: 30px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.1); cursor: pointer; }
        .circle-dark { background: #1e293b; } .circle-light { background: #ffffff; } .circle-rose { background: #fb7185; }

        .news-ticker { background: rgba(0,0,0,0.05); border-bottom: 1px solid var(--accent); height: 35px; display: flex; align-items: center; overflow: hidden; white-space: nowrap; width: 100%; margin-top: 10px; flex-shrink: 0; }
        .ticker-wrapper { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; font-size: 0.8rem; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .content-area { flex: 1; padding: 10px 15px 100px; overflow-y: auto; width: 100%; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }

        .tab-content { display: none; } .tab-content.active { display: block; }

        .card { background: var(--card); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 15px; border: 1px solid var(--card-border); box-shadow: var(--shadow); position: relative; }
        #nuitCard { border-left: 6px solid var(--violet-nuit); background: rgba(168, 85, 247, 0.05); }
        #dimancheCard { border-left: 6px solid var(--accent); background: rgba(16, 185, 129, 0.05); }

        .pharma-badge-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .pharma-badge { background: var(--bg); padding: 12px; border-radius: var(--radius-md); font-size: 0.8rem; border: 1px solid var(--card-border); display: flex; align-items: center; gap: 8px; font-weight: 600; }

        .pharma-item { background: var(--card); border-radius: var(--radius-md); padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid transparent; }
        .nuit-border { border-left-color: var(--violet-nuit); }

        .section-header { font-size: 0.8rem; font-weight: 800; margin: 25px 5px 12px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }

        .search-container { position: relative; width: 100%; }
        input[type="text"] { width: 100%; padding: 16px 45px 16px 16px; border-radius: var(--radius-md); border: 1px solid var(--card-border); background: var(--input-bg); color: var(--text); outline: none; }
        .clear-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text); opacity: 0.5; display: none; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav); display: flex; justify-content: space-around; padding: 12px 0 30px; border-top: 1px solid var(--card-border); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.75rem; gap: 5px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        .broadcast-item { background: var(--bg); border-radius: var(--radius-md); padding: 15px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--card-border); }
        .btn-assistance { width: 100%; padding: 15px; background: var(--whatsapp); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; text-decoration: none; }
    </style>
</head>
<body class="dark-theme">

<header>
    <img src="icon.jpeg" alt="Logo" class="logo-img">
    <h1 style="margin: 8px 0 0; font-size: 1.7rem; font-weight: 900; background: linear-gradient(to right, var(--accent), #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">PHARMATIC</h1>
    <div class="theme-switcher">
        <div class="theme-circle circle-dark" onclick="setTheme('dark')"></div>
        <div class="theme-circle circle-light" onclick="setTheme('light')"></div>
        <div class="theme-circle circle-rose" onclick="setTheme('rose')"></div>
    </div>
</header>

<div class="news-ticker">
    <div class="ticker-wrapper">✨ PharmaTic : Votre santé, notre priorité à Keur Massar ! ✨</div>
</div>

<div class="content-area">
    <div id="recherche" class="tab-content active">
        <div id="nuitCard" class="card" style="display:none;">
            <h3 style="margin:0; font-size: 0.8rem; color: var(--violet-nuit); text-transform: uppercase;"><i class="fas fa-moon"></i> Garde de nuit</h3>
            <div id="nuitDate" style="font-size: 0.75rem; opacity: 0.7; margin: 5px 0;"></div>
            <div id="statusText" style="font-weight: bold; font-size: 1.1rem; color: var(--text);"></div>
        </div>

        <div id="dimancheCard" class="card" style="display:none;">
            <h3 style="margin:0; font-size: 0.8rem; color: var(--accent); text-transform: uppercase;"><i class="fas fa-sun"></i> Dimanche</h3>
            <div id="dimancheBadgeList" class="pharma-badge-container"></div>
        </div>

        <div class="section-header">Services</div>
        <div class="card" onclick="toggleSearchMenu()" style="display: flex; align-items: center; justify-content: center; gap: 15px; cursor: pointer; border: 2px solid var(--accent);">
            <i class="fas fa-plus-circle" style="font-size: 1.5rem; color: var(--accent);"></i>
            <span style="font-weight: bold;">BESOIN D'UN MÉDICAMENT ?</span>
        </div>

        <div id="search-menu" class="card" style="display: none; margin-top: 10px;">
            <div class="search-container">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Tapez le nom ici...">
                <button id="clearSearch" class="clear-btn" onclick="resetSearch()"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="broadcast-zone" style="display:none; margin-top:15px;">
                <div id="medLabel" style="color: var(--accent); font-weight: bold; text-align:center; margin-bottom: 10px;"></div>
                <div id="pharmaciesOuvertesMed"></div>
            </div>
        </div>
    </div>

    <div id="pharmacies-tab" class="tab-content">
        <div id="listContainer"></div>
    </div>

    <div id="plus-tab" class="tab-content">
        <div class="section-header">Application</div>
        <div class="card" style="text-align:center;">
            <h3>Installer PharmaTic</h3>
            <button style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold;">INSTALLER</button>
        </div>
        <div class="section-header">Assistance</div>
        <div class="card">
            <p style="font-size:0.9rem; opacity:0.8;">Besoin d'aide ? Contactez notre support WhatsApp.</p>
            <a href="https://wa.me/221774338520" class="btn-assistance">
                <i class="fab fa-whatsapp"></i> CONTACTEZ-NOUS
            </a>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('recherche', this)"><i class="fas fa-home"></i><span>Accueil</span></div>
    <div class="nav-item" onclick="switchTab('pharmacies-tab', this)"><i class="fas fa-hospital"></i><span>Pharmacies</span></div>
    <div class="nav-item" onclick="switchTab('plus-tab', this)"><i class="fas fa-ellipsis-h"></i><span>Plus</span></div>
</nav>

<script>
    let pharmacies = [];
    let config = {};

    function getGroupeDimanche() {
        const d = new Date();
        const dateCle = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear().toString().slice(-2)}`;
        const planning = {"26/04/26": 1, "03/05/26": 3, "10/05/26": 2, "17/05/26": 1, "24/05/26": 3, "31/05/26": 2};
        return planning[dateCle] || 0;
    }

    async function loadData() {
        try {
            const res = await fetch('src/data/pharmacies.json?v=' + Date.now());
            const data = await res.json();
            config = data.config; 
            pharmacies = data.pharmacies;
            updateUI();
            renderList(); // Appel immédiat pour que l'onglet Pharmacie ne soit pas vide
        } catch (e) { console.error("Erreur de chargement JSON:", e); }
    }

    function updateUI() {
        const isSun = (new Date().getDay() === 0);
        const grp = getGroupeDimanche();
        
        // Affichage Nuit
        const nuit = pharmacies.filter(p => p.nuit);
        if(nuit.length > 0) {
            document.getElementById('nuitCard').style.display = 'block';
            document.getElementById('statusText').innerText = "📍 " + nuit.map(p => p.nom).join(", ");
            // Correction affichage date
            if(config && config.date_nuit) {
                document.getElementById('nuitDate').innerText = config.date_nuit;
            }
        }

        // Affichage Dimanche
        const dim = pharmacies.filter(p => isSun && p.groupe === grp);
        if(isSun && dim.length > 0) {
            document.getElementById('dimancheCard').style.display = 'block';
            document.getElementById('dimancheBadgeList').innerHTML = dim.map(p => 
                `<div class="pharma-badge"><i class="fas fa-check-circle" style="color:var(--accent)"></i> ${p.nom}</div>`
            ).join('');
        }
    }

    function renderList() {
        const container = document.getElementById('listContainer');
        if (!container) return;
        container.innerHTML = "";

        const sections = [
            { title: '🌙 Gardes de Nuit', list: pharmacies.filter(p => p.nuit), color: 'var(--violet-nuit)' },
            { title: '🏥 Toutes les Pharmacies', list: pharmacies, color: 'var(--accent)' }
        ];

        sections.forEach(s => {
            if(s.list.length === 0) return;
            const h = document.createElement('div');
            h.className = 'section-header';
            h.style.color = s.color;
            h.innerText = s.title;
            container.appendChild(h);

            s.list.forEach(p => {
                const item = document.createElement('div');
                item.className = `pharma-item ${p.nuit ? 'nuit-border' : ''}`;
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.nom + ' ' + p.quartier + ' Keur Massar')}`;
                
                item.innerHTML = `
                    <div>
                        <div style="font-weight:bold;">${p.nom}</div>
                        <div style="font-size:0.75rem; opacity:0.6;">${p.quartier}</div>
                    </div>
                    <div style="display:flex; gap:18px; align-items:center;">
                        <a href="tel:${p.telephone}"><i class="fas fa-phone-alt" style="color:var(--accent); font-size:1.1rem;"></i></a>
                        <a href="${mapsUrl}" target="_blank"><i class="fas fa-map-marker-alt" style="color:var(--primary); font-size:1.1rem;"></i></a>
                    </div>`;
                container.appendChild(item);
            });
        });
    }

    function switchTab(id, el) {
        document.querySelectorAll('.tab-content, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'pharmacies-tab') renderList();
    }

    function handleSearch() {
        const val = document.getElementById('searchInput').value;
        document.getElementById('clearSearch').style.display = val.length > 0 ? "block" : "none";
        if (val.length > 2) {
            document.getElementById('broadcast-zone').style.display = 'block';
            document.getElementById('medLabel').innerText = "📦 " + val;
            generateWA('pharmaciesOuvertesMed', `Bonjour, auriez-vous : *${val}* ?`);
        } else { document.getElementById('broadcast-zone').style.display = 'none'; }
    }

    function generateWA(id, txt) {
        const h = new Date().getHours();
        const isSun = (new Date().getDay() === 0);
        const grp = getGroupeDimanche();
        let html = "";

        pharmacies.forEach(p => {
            const ouvert = (h >= 22 || h < 8) ? p.nuit : (isSun ? p.groupe === grp : true);
            if(ouvert && p.whatsapp) {
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.nom + ' ' + p.quartier)}`;
                html += `
                <div class="broadcast-item">
                    <span>${p.nom}</span>
                    <div style="display:flex; gap:15px; align-items:center;">
                        <a href="https://wa.me/${p.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(txt)}" target="_blank"><i class="fab fa-whatsapp" style="color:var(--whatsapp); font-size:1.4rem;"></i></a>
                        <a href="${mapsUrl}" target="_blank"><i class="fas fa-location-arrow" style="color:var(--primary); font-size:1.2rem;"></i></a>
                    </div>
                </div>`;
            }
        });
        document.getElementById(id).innerHTML = html;
    }

    function resetSearch() { document.getElementById('searchInput').value = ""; handleSearch(); }
    function toggleSearchMenu() { const m = document.getElementById('search-menu'); m.style.display = m.style.display === 'none' ? 'block' : 'none'; }
    function setTheme(t) { document.body.className = t + '-theme'; localStorage.setItem('pharma-theme', t); }

    window.onload = () => { loadData(); setTheme(localStorage.getItem('pharma-theme') || 'dark'); };
</script>
</body>
</html>
