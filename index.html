<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PharmaTic - Keur Massar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CONFIGURATION ÉCRANS LARGES --- */
        @media (min-width: 768px) {
            body { max-width: 450px; margin: 0 auto; border-left: 1px solid rgba(0,0,0,0.1); border-right: 1px solid rgba(0,0,0,0.1); position: relative; }
            .bottom-nav { width: 450px; left: 50% !important; transform: translateX(-50%); }
        }

        :root {
            --primary: #00f2fe; --accent: #10b981;
            --rouge-dimanche: #ff4d4d; --violet-nuit: #a855f7;
            --whatsapp: #25D366; --radius-lg: 18px;
            --radius-md: 12px; --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* --- THÈMES --- */
        body.dark-theme { --bg: #0f172a; --text: #f8fafc; --card: rgba(255, 255, 255, 0.06); --nav: #0f172a; --input-bg: rgba(255,255,255,0.05); --card-border: rgba(255,255,255,0.08); }
        body.light-theme { --bg: #f1f5f9; --text: #1e293b; --card: #ffffff; --nav: #ffffff; --input-bg: #e2e8f0; --card-border: rgba(0,0,0,0.05); }
        body.rose-theme { --bg: #fff1f2; --text: #881337; --card: #ffffff; --nav: #fff1f2; --input-bg: #ffe4e6; --card-border: #fecdd3; --accent: #fb7185; }

        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s;
        }

        header { flex-shrink: 0; display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 10px 15px; }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 35px; height: 35px; border-radius: 10px; border: 1.5px solid var(--accent); }
        
        .theme-switcher { display: flex; gap: 8px; }
        .theme-circle { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.1); cursor: pointer; }
        .circle-dark { background: #1e293b; } .circle-light { background: #ffffff; } .circle-rose { background: #fb7185; }

        .news-ticker { background: rgba(0,0,0,0.04); height: 28px; display: flex; align-items: center; overflow: hidden; white-space: nowrap; width: 100%; border-bottom: 1px solid var(--accent); }
        .ticker-wrapper { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; font-size: 0.75rem; font-weight: bold; color: var(--accent); }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .content-area { flex: 1; padding: 10px 12px; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .content-area::-webkit-scrollbar { display: none; }
        .tab-content { display: none; height: 100%; } .tab-content.active { display: flex; flex-direction: column; gap: 8px; }

        /* Cartes ultra-compactes */
        .card { background: var(--card); border-radius: var(--radius-md); padding: 12px; border: 1px solid var(--card-border); box-shadow: var(--shadow); position: relative; flex-shrink: 0; }
        
        h1 { font-size: 1.2rem; margin: 0; background: linear-gradient(to right, var(--accent), #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        h3 { margin: 0 0 8px 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }

        .pharma-badge-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
        .pharma-badge { background: var(--bg); padding: 8px; border-radius: 8px; font-size: 0.75rem; border: 1px solid var(--card-border); display: flex; align-items: center; gap: 5px; font-weight: 600; }

        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--card-border); background: var(--input-bg); color: var(--text); outline: none; font-size: 0.9rem; }
        
        .btn-main-action { width: 100%; padding: 10px; background: none; border: 1.5px dashed var(--accent); border-radius: 10px; color: var(--text); cursor: pointer; font-weight: bold; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav); display: flex; justify-content: space-around; padding: 10px 0 25px; border-top: 1px solid var(--card-border); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.7rem; cursor: pointer; gap: 3px; font-weight: 600; }
        .nav-item.active { color: var(--accent); }

        .broadcast-item { background: var(--bg); border-radius: 8px; padding: 10px; margin-top: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--card-border); }
        .section-header { font-size: 0.75rem; font-weight: 800; margin: 10px 0 5px; color: var(--accent); text-transform: uppercase; }
    </style>
</head>
<body class="dark-theme">

<header>
    <div class="logo-container">
        <img src="icon.jpeg" alt="Logo" class="logo-img">
        <h1>PHARMATIC</h1>
    </div>
    <div class="theme-switcher">
        <div class="theme-circle circle-dark" onclick="setTheme('dark')"></div>
        <div class="theme-circle circle-light" onclick="setTheme('light')"></div>
        <div class="theme-circle circle-rose" onclick="setTheme('rose')"></div>
    </div>
</header>

<div class="news-ticker">
    <div class="ticker-wrapper">✨ PharmaTic : Votre santé, notre priorité à Keur Massar ! ✨</div>
</div>

<div class="content-area">
    <div id="recherche" class="tab-content active">
        <div id="nuitCard" class="card" style="display:none; border-left: 4px solid var(--violet-nuit);">
            <h3 style="color: var(--violet-nuit); font-size: 0.75rem;"><i class="fas fa-moon"></i> Garde de nuit</h3>
            <div id="statusText" style="font-weight: 700; font-size: 0.9rem;"></div>
        </div>

        <div id="dimancheCard" class="card" style="display:none; border-left: 4px solid var(--accent);">
            <h3 style="color: var(--accent); font-size: 0.75rem;"><i class="fas fa-sun"></i> Dimanche</h3>
            <div id="dimancheBadgeList" class="pharma-badge-container"></div>
        </div>

        <div class="section-header">Services</div>
        <div class="card">
            <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Nom du médicament...">
            <button class="btn-main-action" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-camera"></i> SCANNER ORDONNANCE
            </button>
            
            <div id="broadcast-zone" style="display:none; margin-top:10px;">
                <div id="medLabel" style="color: var(--accent); font-weight: 800; text-align:center; margin-bottom: 10px;"></div>
                <div id="pharmaciesOuvertesMed"></div>
            </div>
        </div>
    </div>

    <div id="pharmacies-tab" class="tab-content">
        <div id="listContainer"></div>
    </div>

    <div id="plus-tab" class="tab-content">
        <div class="card" style="text-align:center;">
            <h3>Installer PharmaTic</h3>
            <button id="pwaBtn" class="btn-main-action" style="border-style:solid; background:var(--accent); color:white;">INSTALLER</button>
        </div>
        <a href="https://wa.me/221776779440" target="_blank" style="text-decoration:none; color:inherit;">
            <div class="card" style="display:flex; align-items:center; gap:10px; border-left: 4px solid var(--whatsapp);">
                <i class="fab fa-whatsapp" style="font-size: 1.5rem; color: var(--whatsapp);"></i>
                <h3 style="margin:0;">Aide WhatsApp</h3>
            </div>
        </a>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('recherche', this)"><i class="fas fa-home"></i><span>Accueil</span></div>
    <div class="nav-item" onclick="switchTab('pharmacies-tab', this)"><i class="fas fa-list"></i><span>Liste</span></div>
    <div class="nav-item" onclick="switchTab('plus-tab', this)"><i class="fas fa-plus"></i><span>Plus</span></div>
</nav>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelected()">

<script>
    let pharmacies = []; let config = {}; let deferredPrompt;

    function getGroupeDimanche() {
        const aujourdhui = new Date();
        const d = String(aujourdhui.getDate()).padStart(2, '0');
        const m = String(aujourdhui.getMonth() + 1).padStart(2, '0');
        const y = aujourdhui.getFullYear().toString().slice(-2);
        const cle = `${d}/${m}/${y}`;
        const p = {"05/04/26": 2, "12/04/26": 3, "19/04/26": 2, "26/04/26": 1, "03/05/26": 3, "10/05/26": 2, "17/05/26": 1, "24/05/26": 3, "31/05/26": 2, "07/06/26": 1, "14/06/26": 3, "21/06/26": 2, "28/06/26": 1, "05/07/26": 3, "12/07/26": 2, "19/07/26": 1, "26/07/26": 3, "02/08/26": 2, "09/08/26": 1, "16/08/26": 3, "23/08/26": 2, "30/08/26": 1, "06/09/26": 3, "13/09/26": 2, "20/09/26": 1, "27/09/26": 3, "04/10/26": 2, "11/10/26": 1, "18/10/26": 3, "25/10/26": 2, "01/11/26": 1, "08/11/26": 3, "15/11/26": 2, "22/11/26": 1, "29/11/26": 3, "06/12/26": 2, "13/12/26": 1, "20/12/26": 3, "27/12/26": 2};
        return p[cle] || 0;
    }

    async function loadData() {
        try {
            const res = await fetch('src/data/pharmacies.json?v=' + Date.now());
            const data = await res.json();
            config = data.config; pharmacies = data.pharmacies;
            updateUI();
        } catch (e) { console.error(e); }
    }

    function updateUI() {
        const isSun = (new Date().getDay() === 0);
        const grp = getGroupeDimanche();
        const nuit = pharmacies.filter(p => p.nuit);
        if(nuit.length > 0) {
            document.getElementById('nuitCard').style.display = 'block';
            document.getElementById('statusText').innerText = nuit.map(p => p.nom).join(", ");
        }
        const dim = pharmacies.filter(p => isSun && p.groupe === grp);
        if(isSun && dim.length > 0) {
            document.getElementById('dimancheCard').style.display = 'block';
            document.getElementById('dimancheBadgeList').innerHTML = dim.map(p => `<div class="pharma-badge"><i class="fas fa-check"></i> ${p.nom}</div>`).join('');
        }
    }

    function handleSearch() {
        const v = document.getElementById('searchInput').value;
        if (v.length > 2) {
            document.getElementById('broadcast-zone').style.display = 'block';
            document.getElementById('medLabel').innerText = "Résultats pour : " + v;
            generateWA('pharmaciesOuvertesMed', `Besoin de : *${v}*`);
        } else { document.getElementById('broadcast-zone').style.display = 'none'; }
    }

    function generateWA(id, txt) {
        const h = new Date().getHours(); const isSun = (new Date().getDay() === 0); const grp = getGroupeDimanche();
        let html = "";
        pharmacies.forEach(p => {
            const ouvert = (h >= 22 || h < 8 ? p.nuit : (isSun ? (p.groupe === grp) : true));
            if(ouvert && p.whatsapp) {
                html += `<div class="broadcast-item"><span>${p.nom}</span><a href="https://wa.me/${p.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(txt)}" target="_blank"><i class="fab fa-whatsapp" style="color:var(--whatsapp); font-size:1.2rem;"></i></a></div>`;
            }
        });
        document.getElementById(id).innerHTML = html;
    }

    function switchTab(id, el) {
        document.querySelectorAll('.tab-content, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
        if(id === 'pharmacies-tab') renderList();
    }

    function renderList() {
        const c = document.getElementById('listContainer'); c.innerHTML = "";
        pharmacies.forEach(p => {
            const d = document.createElement('div'); d.className = 'pharma-item';
            d.style = "display:flex; justify-content:space-between; padding:10px; background:var(--card); margin-bottom:5px; border-radius:8px; font-size:0.8rem;";
            d.innerHTML = `<span>${p.nom}</span><a href="tel:${p.telephone}"><i class="fas fa-phone" style="color:var(--accent)"></i></a>`;
            c.appendChild(d);
        });
    }

    function setTheme(t) { document.body.className = t + '-theme'; localStorage.setItem('pharma-theme', t); }
    function handleFileSelected() { document.getElementById('broadcast-zone').style.display = 'block'; generateWA('pharmaciesOuvertesMed', "Avez-vous ce produit sur ordonnance ? (Photo)"); }

    window.onload = () => { loadData(); setTheme(localStorage.getItem('pharma-theme') || 'dark'); };
</script>
</body>
</html>
