<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PharmaTic - Keur Massar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CONFIGURATION DES ÉCRANS LARGES (PC/TABLETTE) --- */
        @media (min-width: 768px) {
            body {
                max-width: 450px;
                margin: 0 auto;
                border-left: 1px solid rgba(255,255,255,0.1);
                border-right: 1px solid rgba(255,255,255,0.1);
                box-shadow: 0 0 50px rgba(0,0,0,0.8);
                position: relative;
            }
            .bottom-nav {
                width: 450px;
                left: 50% !important;
                right: auto !important;
                transform: translateX(-50%);
            }
        }

        :root {
            --primary: #00f2fe; --accent: #00ff88;
            --rouge-dimanche: #ff4d4d; --violet-nuit: #a855f7;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* --- THÈMES --- */
        body.dark-theme { --bg: #0f172a; --text: #ffffff; --card: rgba(255, 255, 255, 0.08); --nav: #0f172a; --input-bg: rgba(255,255,255,0.05); }
        body.light-theme { --bg: #f8fafc; --text: #1e293b; --card: #ffffff; --nav: #f8fafc; --input-bg: rgba(0,0,0,0.05); }
        body.rose-theme { --bg: #fdf2f8; --text: #831843; --card: #fbcfe8; --nav: #fdf2f8; --input-bg: rgba(255,255,255,0.5); }

        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; transition: 0.3s;
        }

        header { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 10px 10px 5px; }
        .logo-img { width: 55px; height: 55px; border-radius: 15px; border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }

        .news-ticker { 
            background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--accent); height: 35px;
            display: flex; align-items: center; overflow: hidden; white-space: nowrap; width: 100%;
            position: relative; z-index: 10; margin-bottom: 10px; flex-shrink: 0;
        }
        .ticker-wrapper { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; font-size: 0.85rem; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .content-area { flex: 1; padding: 10px 15px 100px; overflow-y: auto; width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        
        #dimancheCard { background: rgba(0, 255, 136, 0.05); border-left: 5px solid var(--accent); margin-bottom: 15px; }
        .pharma-badge-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .pharma-badge { background: rgba(0, 255, 136, 0.1); padding: 6px 12px; border-radius: 10px; font-size: 0.8rem; border: 1px solid rgba(0, 255, 136, 0.2); display: flex; align-items: center; gap: 6px; color: var(--text); }

        .pharma-item { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; }
        .nuit-border { border-left-color: var(--violet-nuit); }
        .dimanche-border { border-left-color: var(--accent); }
        
        .section-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; font-weight: 800; margin: 20px 5px 10px; text-transform: uppercase; }

        .theme-switcher { display: flex; gap: 8px; width: 100%; max-width: 400px; margin-top: 10px; padding: 0 10px; }
        .theme-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        .btn-dark { background: #1e293b; color: white; }
        .btn-light { background: #ffffff; color: #1e293b; }
        .btn-rose { background: #fbcfe8; color: #831843; }

        input[type="text"] { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,255,136,0.2); background: var(--input-bg); color: inherit; outline: none; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.1); border: none; color: inherit; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }

        .broadcast-item { background: rgba(0,0,0,0.05); border-radius: 12px; padding: 12px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,255,136,0.1); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav); display: flex; justify-content: space-around; padding: 12px 0 25px; border-top: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: grey; font-size: 0.7rem; text-decoration: none; cursor: pointer; gap: 4px; }
        .nav-item.active { color: var(--accent); }
        .pharma-badge-container {
    display: grid;
    grid-template-columns: 1fr 1fr; /* Crée deux colonnes égales */
    gap: 10px;
    margin-top: 10px;
}
.pharma-badge {
    justify-content: flex-start; /* Aligne l'icône et le texte au début */
    padding: 10px;
    width: 100%; /* Prend toute la place de la colonne */
}
    </style>
</head>
<body class="dark-theme">

<header>
    <img src="icon.jpeg" alt="Logo" class="logo-img">
    <h1 style="margin: 5px 0 0; font-size: 1.6rem; font-weight: 900; background: linear-gradient(to right, var(--accent), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">PHARMATIC</h1>
    <div class="theme-switcher">
        <button class="theme-btn btn-dark" onclick="setTheme('dark')">Sombre</button>
        <button class="theme-btn btn-light" onclick="setTheme('light')">Clair</button>
        <button class="theme-btn btn-rose" onclick="setTheme('rose')">Rose</button>
    </div>
</header>

<div class="news-ticker">
    <div class="ticker-wrapper">✨ PharmaTic : Votre santé, notre priorité à Keur Massar ! ✨</div>
</div>

<div class="content-area">
    <div id="recherche" class="tab-content active">
        <div id="nuitCard" class="card" style="display:none; border-left: 5px solid var(--violet-nuit); background: rgba(168, 85, 247, 0.1);">
            <h3 style="margin:0; font-size: 0.8rem; color: var(--violet-nuit); text-transform: uppercase;"><i class="fas fa-moon"></i> Garde de nuit</h3>
            <div id="statusText" style="font-weight: bold; margin-top: 8px; font-size: 1.1rem;"></div>
        </div>

        <div id="dimancheCard" class="card" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0; font-size: 0.8rem; color: var(--accent); text-transform: uppercase;"><i class="fas fa-sun"></i> Gardes du Dimanche</h3>
                <span style="font-size: 0.6rem; background: var(--accent); color: #0f172a; padding: 2px 6px; border-radius: 4px; font-weight: bold;">OUVERT</span>
            </div>
            <div id="dimancheBadgeList" class="pharma-badge-container"></div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; font-size: 0.9rem;">Chercher un médicament</h3>
            <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Doliprane, Spasfon...">
            <div id="broadcast-zone" style="display:none; margin-top:15px;">
                <button class="close-btn" onclick="resetSearch()"><i class="fas fa-times"></i></button>
                <div id="medLabel" style="color: var(--accent); font-weight: bold; text-align:center; font-size: 1.1rem; margin-bottom: 10px;"></div>
                <div id="pharmaciesOuvertesMed"></div>
                <div id="pharmaciesFermeesMed" style="margin-top: 15px;"></div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; font-size: 0.9rem;">Par ordonnance</h3>
            <button onclick="document.getElementById('fileInput').click()" style="width:100%; padding:15px; background:none; border:1.5px dashed var(--accent); border-radius:12px; color:inherit; cursor:pointer; font-weight: bold;">
                <i class="fas fa-camera"></i> PRENDRE PHOTO ORDONNANCE
            </button>
            <div id="ordo-zone" style="display:none; margin-top:15px;">
                <button class="close-btn" onclick="resetOrdo()"><i class="fas fa-times"></i></button>
                <p style="font-size: 0.8rem; color: var(--accent); font-weight: bold; text-align:center;">📸 PHOTO PRÊTE</p>
                <div id="pharmaciesOuvertesOrdo"></div>
                <div id="pharmaciesFermeesOrdo" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <div id="pharmacies-tab" class="tab-content">
        <div id="listContainer"></div>
    </div>

    <div id="installer-tab" class="tab-content">
        <div class="card" style="text-align:center;">
            <i class="fas fa-download" style="font-size: 3rem; color: var(--accent); margin-bottom: 15px;"></i>
            <h3>Installer l'App</h3>
            <p style="font-size: 0.9rem; opacity: 0.8;">Accédez à PharmaTic en un clic depuis votre écran d'accueil.</p>
            <button id="pwaBtn" style="width:100%; padding:16px; background:var(--accent); color:#0f172a; border:none; border-radius:12px; font-weight:900; cursor:pointer; margin-top:10px;">INSTALLER MAINTENANT</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('recherche', this)"><i class="fas fa-search"></i><span>Recherche</span></div>
    <div class="nav-item" onclick="switchTab('pharmacies-tab', this)"><i class="fas fa-hospital"></i><span>Pharmacies</span></div>
    <div class="nav-item" onclick="switchTab('installer-tab', this)"><i class="fas fa-download"></i><span>Installer</span></div>
    <a href="https://wa.me/221776779440" target="_blank" class="nav-item"><i class="fas fa-info-circle"></i><span>Aide</span></a>
</nav>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelected()">

<script>
    let pharmacies = [];
    let config = {};
    let deferredPrompt;

    // --- LOGIQUE AUTOMATISATION DIMANCHE ---
    function getGroupeDimanche() {
    // On définit aujourd'hui (29 Mars 2026) comme le point de départ du Groupe 0
    const reference = new Date(2026, 2, 29, 12, 0, 0); 
    const aujourdhui = new Date();
    
    // On normalise les dates pour ignorer les heures/minutes
    const aujourdhuiMidi = new Date(aujourdhui.getFullYear(), aujourdhui.getMonth(), aujourdhui.getDate(), 12, 0, 0);
    
    const diff = aujourdhuiMidi - reference;
    const uneSemaine = 7 * 24 * 60 * 60 * 1000;
    
    // Calcul du nombre de semaines d'écart
    const semaines = Math.round(diff / uneSemaine);
    
    // On force le résultat sur un cycle de 4 groupes (0, 1, 2, 3)
    let groupeActuel = semaines % 4;
    if (groupeActuel < 0) groupeActuel += 4;
    
    return groupeActuel;
}



    async function loadData() {
        try {
            const response = await fetch('src/data/pharmacies.json?t=' + new Date().getTime());
            const data = await response.json();
            config = data.config;
            pharmacies = data.pharmacies;
            updateUI();
        } catch (e) { console.error("Erreur de chargement :", e); }
    }

    function updateUI() {
        const isSunday = (new Date().getDay() === 0);
        const groupeAuj = getGroupeDimanche();

        // NUIT
        const activeNuit = pharmacies.filter(p => p.nuit);
        const nuitCard = document.getElementById('nuitCard');
        if(activeNuit.length > 0) {
            nuitCard.style.display = 'block';
            document.getElementById('statusText').innerHTML = `
                <div style="font-size: 0.6rem; opacity: 0.7; font-weight: normal; margin-bottom: 5px;">${config.date_nuit}</div>
                <div style="color: var(--text);">📍 ${activeNuit.map(p => p.nom).join(", ")}</div>
            `;
        } else { nuitCard.style.display = 'none'; }

        // DIMANCHE - Affichage automatique sur l'onglet Recherche
        const activeDimanche = pharmacies.filter(p => isSunday && p.groupe === groupeAuj);
        const dimancheCard = document.getElementById('dimancheCard');
        const badgeList = document.getElementById('dimancheBadgeList');
        
        if(isSunday && activeDimanche.length > 0) {
            dimancheCard.style.display = 'block';
            badgeList.innerHTML = activeDimanche.map(p => `
                <div class="pharma-badge"><i class="fas fa-check-circle" style="color:var(--accent)"></i> ${p.nom}</div>
            `).join('');
        } else { dimancheCard.style.display = 'none'; }
    }

    function handleSearch() {
        const val = document.getElementById('searchInput').value;
        if (val.length > 2) {
            document.getElementById('broadcast-zone').style.display = 'block';
            document.getElementById('medLabel').innerText = "📦 " + val;
            generateWA('pharmaciesOuvertesMed', 'pharmaciesFermeesMed', `Auriez-vous le médicament : *${val}* ?`);
        } else { document.getElementById('broadcast-zone').style.display = 'none'; }
    }

    function generateWA(idOpen, idClose, customText) {
        const now = new Date();
        const hour = now.getHours();
        const isSunday = (now.getDay() === 0);
        const groupeAuj = getGroupeDimanche();
        let htmlOpen = ""; let htmlFerme = "";

        pharmacies.forEach(p => {
            // Logique d'ouverture dynamique
            const ouvert = (hour >= 22 || hour < 8 ? p.nuit : (isSunday ? (p.groupe === groupeAuj) : true));
            const hasWA = p.whatsapp && p.whatsapp.trim() !== "";
            const cleanNum = hasWA ? p.whatsapp.replace(/\D/g, '') : null;
            const msg = encodeURIComponent(`🌟 *PharmaTic* 🌟\n${customText}`);
            
            let waButton = hasWA ? 
                `<a href="https://wa.me/${cleanNum}?text=${msg}" target="_blank"><i class="fab fa-whatsapp" style="color:var(--whatsapp); font-size:1.3rem;"></i></a>` :
                `<i class="fab fa-whatsapp" style="color:grey; font-size:1.3rem; opacity:0.3;" onclick="alert('Contactez-les par téléphone.')"></i>`;

            const card = `
                <div class="broadcast-item" style="${ouvert ? '' : 'opacity:0.5;'}">
                    <span style="font-weight:bold; font-size:0.85rem;">${p.nom}</span>
                    <div style="display:flex; gap:15px; align-items:center;">
                        ${waButton}
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.nom + ' ' + p.quartier)}" target="_blank">
                            <i class="fas fa-map-marker-alt" style="color:var(--primary); font-size:1.1rem;"></i>
                        </a>
                    </div>
                </div>`;
            if(ouvert) htmlOpen += card; else htmlFerme += card;
        });

        document.getElementById(idOpen).innerHTML = htmlOpen;
        const closedContainer = document.getElementById(idClose);
        if (closedContainer) closedContainer.innerHTML = htmlFerme ? `<p style="font-size:0.7rem; opacity:0.5; text-align:center; margin-top:10px;">Indisponibles :</p>${htmlFerme}` : "";
    }

    function switchTab(id, el) {
        document.querySelectorAll('.tab-content, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        el.classList.add('active');
        const contentArea = document.querySelector('.content-area');
        if (contentArea) contentArea.scrollTo({ top: 0, behavior: 'smooth' });
        if(id === 'pharmacies-tab') renderList();
    }

    function renderList() {
        const container = document.getElementById('listContainer');
        if (!container) return;
        container.innerHTML = "";
        
        const groupeAuj = getGroupeDimanche();
        const listDimanche = pharmacies.filter(p => p.groupe === groupeAuj);

        const sections = [
            { title: '🌙 Gardes de Nuit', list: pharmacies.filter(p => p.nuit), border: 'nuit-border', color: 'var(--violet-nuit)', date: config.date_nuit },
            { title: '☀️ Gardes du Dimanche', list: listDimanche, border: 'dimanche-border', color: 'var(--accent)', date: config.date_dimanche },
            { title: '🏥 Toutes les Pharmacies', list: pharmacies, border: '', color: 'var(--accent)', date: null }
        ];

        sections.forEach(s => {
            if(s.list.length === 0 && s.title !== '🏥 Toutes les Pharmacies') return;
            const h = document.createElement('div');
            h.className = 'section-header';
            h.style.color = s.color;
            h.innerHTML = `<div style="display:flex; flex-direction:column;"><span>${s.title}</span>${s.date ? `<span style="font-size:0.55rem; opacity:0.7; font-weight:normal; text-transform: none;">${s.date}</span>` : ''}</div>`;
            container.appendChild(h);
            
            s.list.forEach(p => {
                const item = document.createElement('div');
                item.className = `pharma-item ${s.border}`;
                const star = p.partenaire ? '<i class="fas fa-star" style="color: #ffca28; font-size: 0.7rem; margin-left: 5px;"></i>' : '';
                item.innerHTML = `
                    <div><div style="font-weight:bold; display: flex; align-items: center;">${p.nom} ${star}</div><div style="font-size:0.7rem; opacity:0.6;">${p.quartier}</div></div>
                    <div style="display:flex; gap:20px; font-size:1.2rem;">
                        <a href="tel:${p.telephone}"><i class="fas fa-phone-alt" style="color:var(--accent)"></i></a>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.nom + ' ' + p.quartier)}" target="_blank" style="color:var(--primary);"><i class="fas fa-map-marker-alt"></i></a>
                    </div>`;
                container.appendChild(item);
            });
        });
    }

    function setTheme(t) { document.body.className = t + '-theme'; localStorage.setItem('theme', t); }
    function resetSearch() { document.getElementById('searchInput').value = ""; document.getElementById('broadcast-zone').style.display = 'none'; }
    function resetOrdo() { document.getElementById('ordo-zone').style.display = 'none'; }
    function handleFileSelected() { document.getElementById('ordo-zone').style.display = 'block'; generateWA('pharmaciesOuvertesOrdo', 'pharmaciesFermeesOrdo', "Avez-vous les produits de cette ordonnance ?"); }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js?v=1.48').then(reg => {
                reg.onupdatefound = () => {
                    const worker = reg.installing;
                    worker.onstatechange = () => { if (worker.state === 'installed' && navigator.serviceWorker.controller) window.location.reload(); };
                };
            });
        });
    }

    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });
    document.getElementById('pwaBtn').onclick = async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') deferredPrompt = null;
        } else { alert("Pour installer : Partager > Écran d'accueil."); }
    };

    window.onload = loadData;
    if(localStorage.getItem('theme')) setTheme(localStorage.getItem('theme'));
</script>
</body>
</html>
